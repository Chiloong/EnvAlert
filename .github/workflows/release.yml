name: EnvAlert Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build package
        run: |
          mkdir -p dist
          cp -r *.py dist/ || true
          cp -r core dist/ || true
          cp -r storage dist/ || true   # 🔥修复点
          cp README.md dist/ || true
          tar -czf envalert-${VERSION}.tar.gz dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "EnvAlert ${{ env.VERSION }}"
          body: |
            🚀 EnvAlert Release ${{ env.VERSION }}

            ## 内容说明
            - 事件驱动系统
            - Bark稳定推送（POST）
            - storage状态持久化
            - 当前运行系统完整快照
          files: envalert-${{ env.VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
